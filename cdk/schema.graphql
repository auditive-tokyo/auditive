type Content {
  id: ID!
  title: String!
  content: String
  status: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

type ContentConnection {
  items: [Content]
  nextToken: String
}

input CreateContentInput {
  title: String!
  content: String
  status: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

input DeleteContentInput {
  id: ID!
}

input ModelSizeInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
}

input TableBooleanFilterInput {
  ne: Boolean
  eq: Boolean
  attributeExists: Boolean
}

input TableContentFilterInput {
  id: TableIDFilterInput
  title: TableStringFilterInput
  content: TableStringFilterInput
  createdAt: TableStringFilterInput
  updatedAt: TableStringFilterInput
}

input TableFloatFilterInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  attributeExists: Boolean
}

input TableIDFilterInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  attributeExists: Boolean
  size: ModelSizeInput
}

input TableIntFilterInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  attributeExists: Boolean
}

input TableStringFilterInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  attributeExists: Boolean
  size: ModelSizeInput
}

input UpdateContentInput {
  id: ID!
  title: String
  content: String
  status: String
  updatedAt: AWSDateTime
}

type SiteConfig {
  id: ID!
  defaultPageId: String
  menuOrder: [String]
}

type ContactFormResponse {
  success: Boolean!
  message: String
}

input SendContactFormInput {
  name: String!
  email: String!
  message: String!
}

type Mutation {
  createContent(input: CreateContentInput!): Content
  updateContent(input: UpdateContentInput!): Content
  deleteContent(input: DeleteContentInput!): Content
  updateSiteConfig(id: ID!, defaultPageId: String, menuOrder: [String]): SiteConfig
  sendContactForm(input: SendContactFormInput!): ContactFormResponse
}

type Query {
  getContent(id: ID!): Content
  listContents(filter: TableContentFilterInput, limit: Int, nextToken: String): ContentConnection
  getSiteConfig(id: ID!): SiteConfig
}
