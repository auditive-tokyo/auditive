AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  SenderEmail:
    Type: String
    Description: "Sender email address for contact form"
  ReceiverEmail:
    Type: String
    Description: "Receiver email address for contact form"
  ZohoAppPassword:
    Type: String
    Description: "Zoho app password for email"
    NoEcho: true

Resources:
  # Rate Limit用DynamoDBテーブル
  RateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: auditive-rate-limit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ip
          AttributeType: S
      KeySchema:
        - AttributeName: ip
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Lambda用CloudWatch Log Group
  ContactFormLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/auditive-contact-form
      RetentionInDays: 30

  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: auditive-contact-form
      CodeUri: ../lambda_functions/contact_form/
      Handler: app.lambda_handler
      Runtime: python3.13
      Timeout: 30
      LoggingConfig:
        LogGroup: !Ref ContactFormLogGroup
      Environment:
        Variables:
          SENDER_EMAIL: !Ref SenderEmail
          RECEIVER_EMAIL: !Ref ReceiverEmail
          APP_PASSWORD: !Ref ZohoAppPassword
          RATE_LIMIT_TABLE: !Ref RateLimitTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RateLimitTable

Outputs:
  ContactFormFunctionArn:
    Description: "Contact Form Lambda Function ARN"
    Value: !GetAtt ContactFormFunction.Arn
