AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  ContactFormFunctionArn:
    Type: String
    Description: "Contact Form Lambda Function ARN"

Resources:
  # ===========================================
  # AppSync API (AWS_IAM認証)
  # ===========================================
  AppSyncApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: AuditiveAPI
      AuthenticationType: AWS_IAM

  # ===========================================
  # Cognito Identity Pool (未認証アクセス有効)
  # ===========================================
  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: AuditiveIdentityPool
      AllowUnauthenticatedIdentities: true

  # Identity Pool のロール割り当て
  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn

  # ===========================================
  # 未認証ユーザー用 IAM ロール
  # ===========================================
  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuditiveUnauthRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: AuditiveAppSyncPublicAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - appsync:GraphQL
                Resource:
                  # 全操作を許可（フロントエンドでUIアクセス制御）
                  - !Sub "${AppSyncApi.Arn}/types/Query/*"
                  - !Sub "${AppSyncApi.Arn}/types/Mutation/*"

  ContentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TableName: auditive-content-table

  # SiteConfigテーブル定義
  SiteConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TableName: auditive-site-config

  # GraphQLスキーマ定義
  AppSyncSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Definition: |
        type Content {
          id: ID!
          title: String!
          content: String
          status: String
          createdAt: AWSDateTime
          updatedAt: AWSDateTime
        }

        type ContentConnection {
          items: [Content]
          nextToken: String
        }

        input CreateContentInput {
          title: String!
          content: String
          status: String
          createdAt: AWSDateTime
          updatedAt: AWSDateTime
        }

        input DeleteContentInput {
          id: ID!
        }

        input ModelSizeInput {
          ne: Int
          eq: Int
          le: Int
          lt: Int
          ge: Int
          gt: Int
          between: [Int]
        }

        input TableBooleanFilterInput {
          ne: Boolean
          eq: Boolean
          attributeExists: Boolean
        }

        input TableContentFilterInput {
          id: TableIDFilterInput
          title: TableStringFilterInput
          content: TableStringFilterInput
          createdAt: TableStringFilterInput
          updatedAt: TableStringFilterInput
        }

        input TableFloatFilterInput {
          ne: Float
          eq: Float
          le: Float
          lt: Float
          ge: Float
          gt: Float
          between: [Float]
          attributeExists: Boolean
        }

        input TableIDFilterInput {
          ne: ID
          eq: ID
          le: ID
          lt: ID
          ge: ID
          gt: ID
          contains: ID
          notContains: ID
          between: [ID]
          beginsWith: ID
          attributeExists: Boolean
          size: ModelSizeInput
        }

        input TableIntFilterInput {
          ne: Int
          eq: Int
          le: Int
          lt: Int
          ge: Int
          gt: Int
          between: [Int]
          attributeExists: Boolean
        }

        input TableStringFilterInput {
          ne: String
          eq: String
          le: String
          lt: String
          ge: String
          gt: String
          contains: String
          notContains: String
          between: [String]
          beginsWith: String
          attributeExists: Boolean
          size: ModelSizeInput
        }

        input UpdateContentInput {
          id: ID!
          title: String
          content: String
          status: String
          updatedAt: AWSDateTime
        }

        type SiteConfig {
          id: ID!
          defaultPageId: String
          menuOrder: [String]
        }

        type ContactFormResponse {
          success: Boolean!
          message: String
        }

        input SendContactFormInput {
          name: String!
          email: String!
          message: String!
        }

        type Mutation {
          createContent(input: CreateContentInput!): Content
          updateContent(input: UpdateContentInput!): Content
          deleteContent(input: DeleteContentInput!): Content
          updateSiteConfig(id: ID!, defaultPageId: String, menuOrder: [String]): SiteConfig
          sendContactForm(input: SendContactFormInput!): ContactFormResponse
        }

        type Query {
          getContent(id: ID!): Content
          listContents(filter: TableContentFilterInput, limit: Int, nextToken: String): ContentConnection
          getSiteConfig(id: ID!): SiteConfig
        }

  # DynamoDB データソース
  ContentTableDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Name: auditivecontenttable
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref ContentTable
        AwsRegion: !Ref AWS::Region

  # SiteConfig テーブルのデータソース
  SiteConfigTableDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Name: auditivesiteconfigtable
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref SiteConfigTable
        AwsRegion: !Ref AWS::Region

  # Contact Form Lambda データソース
  ContactFormDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Name: auditivecontactformlambda
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !Ref ContactFormFunctionArn

  # AppSync用Lambda呼び出しロール
  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuditiveAppSyncLambdaRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Ref ContactFormFunctionArn

  # AppSync用DynamoDB操作ロール
  AppSyncDynamoDBRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  # リゾルバー定義
  GetContentResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Query
      FieldName: getContent
      DataSourceName: !GetAtt ContentTableDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "GetItem",
          "key": {
            "id": $util.dynamodb.toDynamoDBJson($ctx.args.id)
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

  ListContentsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Query
      FieldName: listContents
      DataSourceName: !GetAtt ContentTableDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Scan",
          "limit": $util.defaultIfNull($ctx.args.limit, 20),
          "nextToken": $util.toJson($util.defaultIfNull($ctx.args.nextToken, null))
        }
      ResponseMappingTemplate: |
        {
          "items": $util.toJson($ctx.result.items),
          "nextToken": $util.toJson($ctx.result.nextToken)
        }

  CreateContentResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Mutation
      FieldName: createContent
      DataSourceName: !GetAtt ContentTableDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "PutItem",
          "key": {
            "id": $util.dynamodb.toDynamoDBJson($util.autoId())
          },
          "attributeValues": {
            "title": $util.dynamodb.toDynamoDBJson($ctx.args.input.title),
            "content": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.content, "")),
            "status": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.status, "DRAFT")),
            "createdAt": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.createdAt, $util.time.nowISO8601())),
            "updatedAt": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.updatedAt, $util.time.nowISO8601()))
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

  UpdateContentResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Mutation
      FieldName: updateContent
      DataSourceName: !GetAtt ContentTableDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "UpdateItem",
          "key": {
            "id": $util.dynamodb.toDynamoDBJson($ctx.args.input.id)
          },
          "update": {
            "expression": "SET #title = :title, #content = :content, #status = :status, #updatedAt = :updatedAt",
            "expressionNames": {
              "#title": "title",
              "#content": "content",
              "#status": "status",
              "#updatedAt": "updatedAt"
            },
            "expressionValues": {
              ":title": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.title, "")),
              ":content": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.content, "")),
              ":status": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.status, "DRAFT")),
              ":updatedAt": $util.dynamodb.toDynamoDBJson($util.defaultIfNull($ctx.args.input.updatedAt, $util.time.nowISO8601()))
            }
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

  DeleteContentResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Mutation
      FieldName: deleteContent
      DataSourceName: !GetAtt ContentTableDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "DeleteItem",
          "key": {
            "id": $util.dynamodb.toDynamoDBJson($ctx.args.input.id)
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

  # SiteConfig取得用リゾルバー
  GetSiteConfigResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Query
      FieldName: getSiteConfig
      DataSourceName: !GetAtt SiteConfigTableDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "GetItem",
          "key": {
            "id": $util.dynamodb.toDynamoDBJson($ctx.args.id)
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

  # SiteConfig更新用リゾルバー
  UpdateSiteConfigResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Mutation
      FieldName: updateSiteConfig
      DataSourceName: !GetAtt SiteConfigTableDataSource.Name
      RequestMappingTemplate: |
        #if($util.isNull($ctx.args.defaultPageId) && $util.isNull($ctx.args.menuOrder))
          ## 両方とも null の場合は何もしない
          {
            "version": "2017-02-28",
            "operation": "UpdateItem",
            "key": {
              "id": $util.dynamodb.toDynamoDBJson($ctx.args.id)
            },
            "update": {
              "expression": "SET #dummy = :dummy",
              "expressionNames": {"#dummy": "dummy"},
              "expressionValues": {":dummy": $util.dynamodb.toDynamoDBJson("dummy")}
            }
          }
        #elseif($util.isNull($ctx.args.defaultPageId))
          ## defaultPageId だけが null の場合
          {
            "version": "2017-02-28",
            "operation": "UpdateItem",
            "key": {
              "id": $util.dynamodb.toDynamoDBJson($ctx.args.id)
            },
            "update": {
              "expression": "SET #menuOrder = :menuOrder",
              "expressionNames": {"#menuOrder": "menuOrder"},
              "expressionValues": {":menuOrder": $util.dynamodb.toDynamoDBJson($ctx.args.menuOrder)}
            }
          }
        #elseif($util.isNull($ctx.args.menuOrder))
          ## menuOrder だけが null の場合
          {
            "version": "2017-02-28",
            "operation": "UpdateItem",
            "key": {
              "id": $util.dynamodb.toDynamoDBJson($ctx.args.id)
            },
            "update": {
              "expression": "SET #defaultPageId = :defaultPageId",
              "expressionNames": {"#defaultPageId": "defaultPageId"},
              "expressionValues": {":defaultPageId": $util.dynamodb.toDynamoDBJson($ctx.args.defaultPageId)}
            }
          }
        #else
          ## 両方とも存在する場合
          {
            "version": "2017-02-28",
            "operation": "UpdateItem",
            "key": {
              "id": $util.dynamodb.toDynamoDBJson($ctx.args.id)
            },
            "update": {
              "expression": "SET #defaultPageId = :defaultPageId, #menuOrder = :menuOrder",
              "expressionNames": {
                "#defaultPageId": "defaultPageId",
                "#menuOrder": "menuOrder"
              },
              "expressionValues": {
                ":defaultPageId": $util.dynamodb.toDynamoDBJson($ctx.args.defaultPageId),
                ":menuOrder": $util.dynamodb.toDynamoDBJson($ctx.args.menuOrder)
              }
            }
          }
        #end
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

  # Contact Form リゾルバー
  SendContactFormResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Mutation
      FieldName: sendContactForm
      DataSourceName: !GetAtt ContactFormDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {
            "arguments": $util.toJson($ctx.args.input)
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

Outputs:
  ApiEndpoint:
    Description: "AppSync API Endpoint"
    Value: !GetAtt AppSyncApi.GraphQLUrl
  IdentityPoolId:
    Description: "Cognito Identity Pool ID"
    Value: !Ref CognitoIdentityPool
  Region:
    Description: "AWS Region"
    Value: !Ref AWS::Region
