name: Create Release PR

on:
  push:
    branches:
      - develop
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "LICENSE.md"
      - "AGENTS.md"

jobs:
  create-pr:
    name: Open PR to release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="Release $(date +%Y-%m-%d)"

          git fetch origin production 2>/dev/null || true
          CHANGELOG=$(git log origin/production..HEAD --pretty=format:"- %s" --no-merges)

          MARKER="<!-- auto-changelog -->"
          BODY_WITH_MARKER=$(printf '%s\n%s' "$CHANGELOG" "$MARKER")

          EXISTING=$(gh pr list --base production --head develop --state open --json number,title,body --jq '.[0]')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base production \
              --head develop \
              --title "$TODAY" \
              --body "$BODY_WITH_MARKER" \
              --label release
          else
            PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
            PR_TITLE=$(echo "$EXISTING" | jq -r '.title')
            PR_BODY=$(echo "$EXISTING" | jq -r '.body')

            if [ "$PR_TITLE" != "$TODAY" ]; then
              gh pr edit "$PR_NUMBER" --title "$TODAY"
              echo "PR #$PR_NUMBER title updated: '$PR_TITLE' → '$TODAY'"
            fi

            if echo "$PR_BODY" | grep -qF "$MARKER"; then
              gh pr edit "$PR_NUMBER" --body "$BODY_WITH_MARKER"
              echo "PR #$PR_NUMBER body updated (auto-changelog)"
            else
              echo "PR #$PR_NUMBER body was manually edited — skipping body update"
            fi
          fi
