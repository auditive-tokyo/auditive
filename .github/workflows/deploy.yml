name: Deploy to GitHub Pages

on:
  push:
    branches:
      - develop
    workflow_dispatch:

jobs:
  # SAM Deploy (Lambda)
  deploy-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: SAM Build and Deploy
        run: |
          cd infrastructure
          sam build -t lambda.yaml
          sam deploy -t .aws-sam/build/template.yaml \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name auditive-lambda \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              SenderEmail=${{ secrets.CONTACT_FORM_EMAIL }} \
              ReceiverEmail=${{ secrets.CONTACT_FORM_EMAIL }} \
              ZohoAppPassword=${{ secrets.ZOHO_APP_PASSWORD }}

      - name: Get Lambda outputs
        run: |
          CONTACT_FORM_ARN=$(aws cloudformation describe-stacks \
            --stack-name auditive-lambda \
            --query "Stacks[0].Outputs[?OutputKey=='ContactFormFunctionArn'].OutputValue" \
            --output text)
          echo "CONTACT_FORM_ARN=${CONTACT_FORM_ARN}" > lambda-outputs.env

      - name: Upload Lambda outputs
        uses: actions/upload-artifact@v4
        with:
          name: lambda-outputs
          path: lambda-outputs.env
          retention-days: 1

  # CFN Deploy (AppSync)
  deploy-appsync:
    runs-on: ubuntu-latest
    needs: deploy-lambda
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download Lambda outputs
        uses: actions/download-artifact@v4
        with:
          name: lambda-outputs

      - name: Load Lambda outputs
        run: cat lambda-outputs.env >> $GITHUB_ENV

      - name: Deploy AppSync with CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/appsync.yaml \
            --stack-name auditive-appsync \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ContactFormFunctionArn=${{ env.CONTACT_FORM_ARN }}

      - name: Get AppSync outputs
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          IDENTITY_POOL_ID=$(aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs[?OutputKey=='IdentityPoolId'].OutputValue" --output text)
          REGION=$(aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs[?OutputKey=='Region'].OutputValue" --output text)
          echo "ENDPOINT=${ENDPOINT}" > appsync-outputs.env
          echo "IDENTITY_POOL_ID=${IDENTITY_POOL_ID}" >> appsync-outputs.env
          echo "REGION=${REGION}" >> appsync-outputs.env

      - name: Upload AppSync outputs
        uses: actions/upload-artifact@v4
        with:
          name: appsync-outputs
          path: appsync-outputs.env
          retention-days: 1

  # Frontend Deploy
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-appsync
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download environment file
        uses: actions/download-artifact@v4
        with:
          name: appsync-outputs

      - name: Load environment variables
        run: cat appsync-outputs.env >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APPSYNC_API_ENDPOINT: ${{ env.ENDPOINT }}
          VITE_COGNITO_IDENTITY_POOL_ID: ${{ env.IDENTITY_POOL_ID }}
          VITE_AWS_REGION: ${{ env.REGION }}
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: auditive.tokyo
