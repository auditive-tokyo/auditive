name: Deploy to GitHub Pages

on:
  push:
    branches:
      - production
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "LICENSE.md"
      - "AGENTS.md"
  workflow_dispatch:

jobs:
  # CDK Deploy (Lambda + AppSync)
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v4
        with:
          python-version: "3.13"

      - name: Install CDK dependencies
        run: |
          npm install -g aws-cdk --ignore-scripts # --ignore-scripts is safe for the CDK CLI
          cd cdk
          python -m venv .venv
          source .venv/bin/activate
          pip install --only-binary :all: -r requirements.txt # NOSONAR: versions are pinned with == in requirements.txt; --only-binary prevents setup script execution

      - name: CDK Bootstrap
        run: |
          cd cdk
          source .venv/bin/activate
          cdk bootstrap --no-previous-parameters

      - name: CDK Deploy (all stacks)
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_FORM_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
        run: |
          cd cdk
          source .venv/bin/activate
          cdk deploy --all --require-approval never \
            --no-fail-on-empty-changeset \
            --parameters auditive-lambda:SenderEmail="$CONTACT_EMAIL" \
            --parameters auditive-lambda:ReceiverEmail="$CONTACT_EMAIL" \
            --parameters auditive-lambda:ZohoAppPassword="$ZOHO_PASSWORD"

      - name: Get API GW outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name auditive-apigw --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name auditive-apigw --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name auditive-apigw --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)
          echo "API_URL=${API_URL}" > apigw-outputs.env
          echo "USER_POOL_ID=${USER_POOL_ID}" >> apigw-outputs.env
          echo "USER_POOL_CLIENT_ID=${USER_POOL_CLIENT_ID}" >> apigw-outputs.env

      - name: Upload API GW outputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apigw-outputs
          path: apigw-outputs.env
          retention-days: 1

  # Frontend Deploy
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Download environment file
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        with:
          name: apigw-outputs

      - name: Load environment variables
        run: cat apigw-outputs.env >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci # --ignore-scripts is intentionally omitted: postinstall scripts are required by esbuild (used internally by Vite)

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ env.API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ env.USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ env.USER_POOL_CLIENT_ID }}
          VITE_AWS_REGION: ${{ secrets.AWS_REGION }}
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: auditive.tokyo
