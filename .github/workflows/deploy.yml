name: Deploy to GitHub Pages

on:
  push:
    branches:
      - develop

jobs:
  # CFN Deploy
  deploy-appsync:
    runs-on: ubuntu-latest
    outputs:
      APPSYNC_ENDPOINT_B64: ${{ steps.appsync-outputs.outputs.APPSYNC_ENDPOINT_B64 }}
      APPSYNC_API_KEY: ${{ steps.appsync-outputs.outputs.APPSYNC_API_KEY }}
      APPSYNC_REGION_B64: ${{ steps.appsync-outputs.outputs.APPSYNC_REGION_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Deploy AppSync with CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/appsync.yaml \
            --stack-name auditive-appsync \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset
            
      - name: Get AppSync outputs and set environment
        id: appsync-outputs
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          API_KEY=$(aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs[?OutputKey=='ApiKey'].OutputValue" --output text)
          REGION=$(aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs[?OutputKey=='Region'].OutputValue" --output text)
          
          # Base64でエンコードして自動マスキングを回避
          ENDPOINT_B64=$(echo -n "$ENDPOINT" | base64 -w0)
          REGION_B64=$(echo -n "$REGION" | base64 -w0)
          
          # エンコードした値を出力
          echo "APPSYNC_ENDPOINT_B64=${ENDPOINT_B64}" >> $GITHUB_OUTPUT
          echo "APPSYNC_API_KEY=${API_KEY}" >> $GITHUB_OUTPUT
          echo "APPSYNC_REGION_B64=${REGION_B64}" >> $GITHUB_OUTPUT

      # ===== DEBUG SECTION START =====
      # 後で削除可能: CloudFormation 出力の直接確認
      - name: Verify direct CloudFormation outputs
        run: |
          echo "=== DIRECT FROM CLOUDFORMATION ==="
          aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs"
      # ===== DEBUG SECTION END =====

  # SAM Deploy
  deploy-lambda:
    runs-on: ubuntu-latest
    needs: deploy-appsync
    steps:
      - name: Checkout contact form backend
        uses: actions/checkout@v4
        with:
          repository: auditive-tokyo/contact_form_backend
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        run: |
          pip install aws-sam-cli

      - name: SAM Build and Deploy
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name auditive-contact-form \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
            "ParameterKey=ApiId,ParameterValue=${CONTACT_FORM_API_GATEWAY_ID} \
             ParameterKey=SenderEmail,ParameterValue=${CONTACT_FORM_EMAIL} \
             ParameterKey=ReceiverEmail,ParameterValue=${CONTACT_FORM_EMAIL} \
             ParameterKey=AppPassword,ParameterValue=${APP_PASSWORD} \
             ParameterKey=RepositoryName,ParameterValue=${GITHUB_REPOSITORY#*/}"
        env:
          CONTACT_FORM_API_GATEWAY_ID: ${{ secrets.CONTACT_FORM_API_GATEWAY_ID }}
          CONTACT_FORM_EMAIL: ${{ secrets.CONTACT_FORM_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

  # Frontend Deploy
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [deploy-appsync, deploy-lambda]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ===== DEBUG SECTION START =====
      # 後で削除可能: 環境変数デバッグ（ビルド前）
      - name: Debug environment variables before build
        run: |
          echo "--- CloudFormation Outputs ---"
          echo "APPSYNC_ENDPOINT_B64 exists: ${{ needs.deploy-appsync.outputs.APPSYNC_ENDPOINT_B64 != '' }}"
          echo "APPSYNC_API_KEY: $(echo "${{ needs.deploy-appsync.outputs.APPSYNC_API_KEY }}" | cut -c1-5)..."
          echo "APPSYNC_REGION_B64 exists: ${{ needs.deploy-appsync.outputs.APPSYNC_REGION_B64 != '' }}"

      # 後で削除可能: CloudFormation スタック詳細確認
      - name: Verify CloudFormation outputs
        run: |
          echo "--- CloudFormation Stack Details ---"
          aws cloudformation describe-stacks --stack-name auditive-appsync --query "Stacks[0].Outputs"

      # 後で削除可能: 検証用のAWS認証情報設定
      - name: Configure AWS credentials (for verification)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 後で削除可能: 最終環境変数確認
      - name: Debug final environment variables
        run: |
          echo "=== ENVIRONMENT VARIABLES FINAL CHECK ==="
          echo "APPSYNC_ENDPOINT_B64 value exists: ${{ needs.deploy-appsync.outputs.APPSYNC_ENDPOINT_B64 != '' }}"
          echo "VITE_APPSYNC_API_KEY value exists: ${{ needs.deploy-appsync.outputs.APPSYNC_API_KEY != '' }}"
          echo "VITE_AWS_REGION value exists: ${{ needs.deploy-appsync.outputs.APPSYNC_REGION_B64 != '' }}"
      # ===== DEBUG SECTION END =====

      # Base64エンコードされた値をデコード
      - name: Decode environment variables
        id: decode-env
        run: |
          ENDPOINT=$(echo "${{ needs.deploy-appsync.outputs.APPSYNC_ENDPOINT_B64 }}" | base64 --decode)
          REGION=$(echo "${{ needs.deploy-appsync.outputs.APPSYNC_REGION_B64 }}" | base64 --decode)
          echo "ENDPOINT=${ENDPOINT}" >> $GITHUB_ENV
          echo "REGION=${REGION}" >> $GITHUB_ENV

      - name: Build
        env:
          VITE_CONTACT_FORM_API_URL: https://${{ secrets.CONTACT_FORM_API_GATEWAY_ID }}.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com/auditive/contact
          VITE_APPSYNC_API_ENDPOINT: ${{ env.ENDPOINT }}
          VITE_APPSYNC_API_KEY: ${{ needs.deploy-appsync.outputs.APPSYNC_API_KEY }}
          VITE_AWS_REGION: ${{ env.REGION }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: auditive.tokyo